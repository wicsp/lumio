<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Send to Atlas</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body aria-busy="true">
    <header>
      <span class="indicator" aria-hidden="true"></span>
      <strong>Send to Atlas</strong>
    </header>
    <p id="status" role="status" aria-live="polite">Preparing capture…</p>
    <dl id="result" hidden>
      <div><dt>Source</dt><dd id="source-id"></dd></div>
      <div><dt>Run</dt><dd id="run-id"></dd></div>
      <div><dt>State</dt><dd id="run-state"></dd></div>
    </dl>
    <pre id="run-result" hidden></pre>
    <button id="retry" type="button" hidden>Retry</button>
    <script src="popup.js"></script>
  </body>
</html>
